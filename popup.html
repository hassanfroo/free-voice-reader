<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Free Voice Reader</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <div class="eyebrow">Free Chrome Text Reader</div>
        <h1>Free Voice Reader</h1>
        <p class="intro">
          Read highlighted text or the main article content on the current page.
        </p>

        <label class="field">
          <span>Voice</span>
          <select id="voiceSelect"></select>
        </label>

        <div class="grid">
          <label class="field">
            <span>Rate</span>
            <input id="rateInput" type="range" min="0.7" max="1.5" step="0.1" />
            <strong id="rateValue">1.0</strong>
          </label>
          <label class="field">
            <span>Pitch</span>
            <input id="pitchInput" type="range" min="0.6" max="1.6" step="0.1" />
            <strong id="pitchValue">1.0</strong>
          </label>
          <label class="field">
            <span>Volume</span>
            <input id="volumeInput" type="range" min="0.2" max="1" step="0.1" />
            <strong id="volumeValue">1.0</strong>
          </label>
        </div>

        <div class="actions">
          <button id="readSelectionButton" class="primary">Read Selection</button>
          <button id="readMainButton">Read Main Content</button>
          <button id="stopButton" class="ghost">Stop</button>
        </div>

        <section class="preview">
          <h2>Detected Text Preview</h2>
          <div class="preview-block">
            <h3>Selection</h3>
            <p id="selectionPreview">Nothing selected yet.</p>
          </div>
          <div class="preview-block">
            <h3>Main Content</h3>
            <p id="mainPreview">Loading preview…</p>
          </div>
        </section>

        <p id="status" class="status" aria-live="polite"></p>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
