<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Free Voice Reader</title>
    <link rel="stylesheet" href="popup.css" />
    <script src="ui-core.js"></script>
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <div class="eyebrow">Free Chrome Text Reader</div>
        <h1>Free Voice Reader</h1>
        <p class="intro">Reads the useful part of the page without the usual clutter.</p>

        <section class="hero">
          <div>
            <div class="mini-label">Main action</div>
            <p id="actionSummary" class="action-summary">Checking this page...</p>
          </div>
          <button id="readButton" class="primary">Read Page</button>
        </section>

        <label class="field">
          <span>Voice</span>
          <select id="voiceSelect"></select>
        </label>

        <section class="field">
          <div class="field-row">
            <span>Speed</span>
            <strong id="rateValue">Comfort</strong>
          </div>
          <div class="speed-presets">
            <button type="button" class="speed-pill" data-rate="0.85">Relaxed</button>
            <button type="button" class="speed-pill" data-rate="1">Comfort</button>
            <button type="button" class="speed-pill" data-rate="1.25">Fast</button>
          </div>
          <input id="rateInput" type="range" min="0.75" max="1.4" step="0.05" />
        </section>

        <div class="actions">
          <button id="readMainButton">Read Main Content</button>
          <button id="stopButton" class="ghost">Stop</button>
          <button id="refreshButton" class="ghost">Refresh Preview</button>
        </div>

        <section class="preview">
          <div class="preview-header">
            <h2>Detected Text</h2>
            <span id="confidenceBadge" class="confidence-badge">Checking</span>
          </div>
          <div class="preview-block">
            <h3 id="previewSourceLabel">Page</h3>
            <p id="mainPreview">Loading preview...</p>
          </div>
        </section>

        <p id="status" class="status" aria-live="polite"></p>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
